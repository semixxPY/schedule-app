<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>硕博作息安排记录</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    
    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6', // 蓝色 - 主色调
                        secondary: '#10B981', // 绿色 - 休息
                        accent: '#F59E0B', // 橙色 - 运动/娱乐
                        neutral: '#6B7280', // 灰色 - 通勤/家务/吃饭
                        dark: '#1F2937',
                        light: '#F9FAFB'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    gridTemplateColumns: {
                        'calendar': '60px repeat(7, 1fr)',
                    },
                    gridTemplateRows: {
                        'calendar': '40px repeat(24, 60px)',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
    
</head>
<body class="bg-gray-50 font-sans">
    <div class="min-h-screen flex flex-col">
        <!-- 顶部导航栏 -->
        <header class="bg-white shadow-sm">
            <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <h1 class="text-xl font-bold text-primary">硕博作息安排</h1>
                    <div class="flex items-center space-x-2">
                        <button id="prevWeek" class="p-2 rounded-full hover:bg-gray-100">
                            <i class="fa fa-chevron-left text-gray-600"></i>
                        </button>
                        <h2 id="currentWeek" class="text-lg font-medium"></h2>
                        <button id="nextWeek" class="p-2 rounded-full hover:bg-gray-100">
                            <i class="fa fa-chevron-right text-gray-600"></i>
                        </button>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="addActivityBtn" class="flex items-center space-x-1 px-3 py-1.5 bg-primary text-white rounded-md hover:bg-blue-600 transition">
                        <i class="fa fa-plus"></i>
                        <span>添加活动</span>
                    </button>
                    <button id="settingsBtn" class="p-2 rounded-full hover:bg-gray-100">
                        <i class="fa fa-cog text-gray-600"></i>
                    </button>
                </div>
            </div>
        </header>
        
        <!-- 主内容区 -->
        <main class="flex-grow flex flex-col md:flex-row">
            <!-- 左侧日历视图 -->
            <div class="w-full md:w-7/12 lg:w-3/4 p-4 overflow-auto" style="height: calc(100vh - 64px);">
                <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                    <div class="calendar-container overflow-auto" style="min-height: 1440px;">
                        <div id="calendar" class="grid grid-cols-calendar grid-rows-calendar">
                            <!-- 日历内容将通过JavaScript动态生成 -->
                        </div>
                    </div>
                </div>
                
            </div>
            
            <!-- 右侧AI助手面板 -->
            <div class="w-full md:w-5/12 lg:w-1/4 bg-white border-l border-gray-200 p-4 overflow-auto" style="height: calc(100vh - 64px);">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-primary flex items-center">
                        <i class="fa fa-robot mr-2"></i>
                        AI助手
                    </h2>
                    <button id="refreshSummary" class="p-2 rounded-full hover:bg-gray-100">
                        <i class="fa fa-refresh text-gray-600"></i>
                    </button>
                </div>
                
                <!-- 每日总结 -->
                <div class="mb-6">
                    <h3 class="text-lg font-medium mb-2 flex items-center">
                        <i class="fa fa-calendar-check-o mr-2 text-primary"></i>
                        <span id="summaryDate">今日总结</span>
                    </h3>
                    <div id="dailySummary" class="bg-gray-50 rounded-lg p-4 text-gray-700">
                        今天还没有记录活动，开始添加你的第一个活动吧！
                    </div>
                </div>
                
                <!-- 本周时间分配饼图 -->
                <div class="mb-6">
                    <h3 class="text-lg font-medium mb-2 flex items-center">
                        <i class="fa fa-pie-chart mr-2 text-primary"></i>
                        本周时间分配
                    </h3>
                    <div class="bg-gray-50 rounded-lg p-3">
                        <canvas id="weeklyChart" height="180"></canvas>
                        <div class="mt-3 grid grid-cols-2 gap-x-4 gap-y-1 text-xs text-gray-700">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center">
                                    <div class="w-2.5 h-2.5 rounded-full bg-primary mr-1.5 flex-shrink-0"></div>
                                    <span>学习/工作</span>
                                </div>
                                <span id="studyWorkTime" class="font-semibold ml-1">0h</span>
                            </div>
                            <div class="flex items-center justify-between">
                                <div class="flex items-center">
                                    <div class="w-2.5 h-2.5 rounded-full bg-secondary mr-1.5 flex-shrink-0"></div>
                                    <span>休息</span>
                                </div>
                                <span id="restTime" class="font-semibold ml-1">0h</span>
                            </div>
                            <div class="flex items-center justify-between">
                                <div class="flex items-center">
                                    <div class="w-2.5 h-2.5 rounded-full bg-accent mr-1.5 flex-shrink-0"></div>
                                    <span>运动/娱乐</span>
                                </div>
                                <span id="exerciseTime" class="font-semibold ml-1">0h</span>
                            </div>
                            <div class="flex items-center justify-between">
                                <div class="flex items-center">
                                    <div class="w-2.5 h-2.5 rounded-full bg-neutral mr-1.5 flex-shrink-0"></div>
                                    <span>家务/通勤</span>
                                </div>
                                <span id="dailyTasksTime" class="font-semibold ml-1">0h</span>
                            </div>
                        </div>
                        <div class="border-t border-gray-200 mt-2 pt-2 text-xs text-right text-gray-500">
                            本周总计：<span id="totalTime" class="font-bold text-gray-700">0h</span>
                        </div>
                    </div>
                </div>

                                <!-- AI计划生成区域 -->
                <div class="mb-4 p-3 bg-blue-50 rounded-lg border border-blue-200">
                    <h3 class="text-lg font-medium mb-2 flex items-center text-blue-800">
                        <i class="fa fa-calendar-check-o mr-2"></i>
                        AI智能计划
                    </h3>
                    <p class="text-sm text-gray-600 mb-2">根据你过去一周的作息数据，AI帮你生成明天的计划安排</p>
                    <button id="generatePlanBtn" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition flex items-center justify-center">
                        <i class="fa fa-magic mr-2"></i>
                        生成明天的计划
                    </button>
                    <div id="planStatus" class="mt-2 text-sm hidden"></div>
                </div>
                <!-- 聊天界面 -->
                <div>
                    <h3 class="text-lg font-medium mb-2 flex items-center">
                        <i class="fa fa-comments mr-2 text-primary"></i>
                        与AI交流
                    </h3>
                    <div id="chatContainer" class="bg-gray-50 rounded-lg p-3 h-64 overflow-y-auto mb-3">
                        <div class="chat-message ai">
                            你好！我是你的AI助手，可以帮你分析作息安排并提供建议。有什么我能帮你的吗？
                        </div>
                    </div>

                    <div class="flex flex-col gap-2">
                        <div class="flex gap-2">
                            <input type="text" id="chatInput" class="flex-grow border border-gray-300 rounded-l-md px-3 py-2 focus:outline-none focus:ring-1 focus:ring-primary" placeholder="输入消息...">
                            <button id="sendChat" class="bg-primary text-white px-4 py-2 rounded-r-md hover:bg-blue-600 transition">
                                <i class="fa fa-paper-plane"></i>
                            </button>
                        </div>
                        <!-- ⭐ 发送方式选择 -->
                        <div class="flex gap-2">
                            <label class="flex items-center gap-2 px-4 py-2 rounded-xl cursor-pointer text-sm transition-all" style="background: linear-gradient(135deg, #FFE5B4, #FFD6A5); color: #8B5A2B; flex: 1; box-shadow: 0 2px 8px rgba(180,140,100,0.1);">
                                <input type="radio" name="sendMode" value="chat" checked style="accent-color: #FF8C5A;">
                                <span><i class="fa fa-comments mr-1"></i>聊天交流</span>
                            </label>
                            <label class="flex items-center gap-2 px-4 py-2 rounded-xl cursor-pointer text-sm transition-all" style="background: linear-gradient(135deg, #D4E4F7, #B8D4E8); color: #2C5F8D; flex: 1; box-shadow: 0 2px 8px rgba(180,140,100,0.1);">
                                <input type="radio" name="sendMode" value="plan" style="accent-color: #FF8C5A;">
                                <span><i class="fa fa-calendar mr-1"></i>明日计划</span>
                            </label>
                        </div>
                        <!-- 选明日计划时的提示 -->
                        <div id="planHint" class="text-xs hidden" style="color: #8B5A2B; background: linear-gradient(135deg, #FFF4E0, #FFE8CC); padding: 8px 12px; border-radius: 12px;">
                            💡 输入你的偏好（如「明天要早睡，10点睡觉」「明天下午3点要健身」），AI会根据你的要求调整明天的计划并保存。
                        </div>
                    </div>
                    <div class="quick-replies mb-2">
                        <button class="quick-reply-btn" onclick="sendQuickReply('帮我总结今天的作息')">📊 今日总结</button>
                        <button class="quick-reply-btn" onclick="sendQuickReply('给我明日计划建议')">📅 明日计划</button>
                        <button class="quick-reply-btn" onclick="sendQuickReply('如何提高工作效率')">💡 效率建议</button>
                        <button class="quick-reply-btn" onclick="sendQuickReply('如何改善睡眠质量')">😴 睡眠建议</button>
                        <button class="quick-reply-btn" onclick="sendQuickReply('如何安排运动时间')">🏃 运动建议</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- 添加/编辑活动模态框 -->
    <div id="activityModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-lg w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-xl font-bold">添加活动</h3>
                <button id="closeModal" class="text-gray-500 hover:text-gray-700">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <form id="activityForm">
                <input type="hidden" id="activityId">
                <input type="hidden" id="activityDate">
                <input type="hidden" id="activityStartTime">
                <input type="hidden" id="activityEndTime">
                
                <div class="mb-4">
                    <label for="activityTitle" class="block text-gray-700 mb-1">活动标题</label>
                    <input type="text" id="activityTitle" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-1 focus:ring-primary" required>
                </div>
                
                <div class="mb-4">
                    <label for="activityType" class="block text-gray-700 mb-1">活动类型</label>
                    <select id="activityType" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-1 focus:ring-primary" required>
                        <option value="学习/工作">学习/工作</option>
                        <option value="休息">休息</option>
                        <option value="运动/娱乐">运动/娱乐</option>
                        <option value="通勤/家务/吃饭">通勤/家务/吃饭</option>
                    </select>
                </div>
                
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label for="activityStart" class="block text-gray-700 mb-1">开始时间</label>
                        <input type="time" id="activityStart" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-1 focus:ring-primary" required>
                    </div>
                    <div>
                        <label for="activityEnd" class="block text-gray-700 mb-1">结束时间</label>
                        <input type="time" id="activityEnd" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-1 focus:ring-primary" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="activityNotes" class="block text-gray-700 mb-1">备注</label>
                    <textarea id="activityNotes" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-1 focus:ring-primary" rows="3"></textarea>
                </div>
                
                <div class="flex justify-end space-x-3">
                    <button type="button" id="deleteActivity" class="px-4 py-2 bg-red-500 text-white rounded-md hover:bg-red-600 transition hidden">
                        删除
                    </button>
                    <button type="button" id="cancelActivity" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition">
                        取消
                    </button>
                    <button type="submit" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-600 transition">
                        保存
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 设置模态框 -->
    <div id="settingsModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-lg w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold">设置</h3>
                <button id="closeSettingsModal" class="text-gray-500 hover:text-gray-700">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <form id="settingsForm">
                <div class="mb-4">
                    <label for="reminderTime" class="block text-gray-700 mb-1">每日记录提醒时间</label>
                    <input type="time" id="reminderTime" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-1 focus:ring-primary">
                </div>
                
                <div class="mb-4">
                    <label class="flex items-center">
                        <input type="checkbox" id="enableReminders" class="form-checkbox h-5 w-5 text-primary">
                        <span class="ml-2 text-gray-700">启用每日提醒</span>
                    </label>
                </div>
                
                <div class="mb-4">
                    <label class="flex items-center">
                        <input type="checkbox" id="enableAI" class="form-checkbox h-5 w-5 text-primary" checked>
                        <span class="ml-2 text-gray-700">启用AI助手</span>
                    </label>
                </div>
                
                <div class="flex justify-end">
                    <button type="button" id="cancelSettings" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition mr-3">
                        取消
                    </button>
                    <button type="submit" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-600 transition">
                        保存
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 提醒通知 -->
    <div id="reminderNotification" class="fixed bottom-4 right-4 bg-white rounded-lg shadow-lg p-4 max-w-sm transform translate-y-full opacity-0 transition-all duration-300 z-50">
        <div class="flex items-start">
            <div class="bg-primary rounded-full p-2 text-white mr-3">
                <i class="fa fa-bell"></i>
            </div>
            <div class="flex-grow">
                <h4 class="font-medium">记录今日活动</h4>
                <p class="text-sm text-gray-600">别忘了记录今天的作息安排哦！</p>
            </div>
            <button id="closeNotification" class="text-gray-400 hover:text-gray-600">
                <i class="fa fa-times"></i>
            </button>
        </div>
        <div class="mt-3 flex justify-end">
            <button id="dismissNotification" class="text-sm text-primary hover:underline">
                稍后提醒
            </button>
            <button id="recordActivity" class="ml-3 px-3 py-1 bg-primary text-white rounded-md hover:bg-blue-600 text-sm">
                立即记录
            </button>
        </div>
    </div>
    <script src="api.js"></script>
    <script src="ai-api.js"></script>
    <script>
        // 全局变量
        let currentDate = new Date();
        let activities = [];
        let userSettings = {
            reminderTime: "20:00",
            enableReminders: true,
            enableAI: true
        };
        let draggedActivity = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        let weeklyChart = null;
        
        // 活动类型颜色映射
        const activityColors = {
            "学习/工作": "bg-primary/80 text-white backdrop-blur-sm",
            "休息": "bg-secondary/80 text-white backdrop-blur-sm",
            "运动/娱乐": "bg-accent/80 text-white backdrop-blur-sm",
            "通勤/家务/吃饭": "bg-neutral/80 text-white backdrop-blur-sm"
        };
        
        // AI计划活动类型颜色映射（更淡的颜色）
        const planActivityColors = {
            "学习/工作": "bg-primary/40 text-white backdrop-blur-sm",
            "休息": "bg-secondary/40 text-white backdrop-blur-sm",
            "运动/娱乐": "bg-accent/40 text-white backdrop-blur-sm",
            "通勤/家务/吃饭": "bg-neutral/40 text-white backdrop-blur-sm"
        };
        
        // 初始化应用
        document.addEventListener('DOMContentLoaded', async function() {
            // 加载数据
            await loadActivities();  // 改为异步加载
            await loadSettings();    // 改为异步加载
                        // ========== 新增：自动清理过期计划 ==========
            try {
                await fetch('https://schedule-app-production-8f26.up.railway.app/api/ai/clean-expired-plans', { method: 'POST' });
                // 清理后重新加载最新数据
                await loadActivities();
            } catch (error) {
                console.log('清理过期计划失败（可能后端未启动）', error);
            }
            // 初始化日历
            renderCalendar();
            
            // 初始化图表
            initWeeklyChart();
            
            // 更新统计信息
            updateStatistics();
            
            // 更新AI总结和计划
            updateAISummary();
            
            // 设置事件监听器
            setupEventListeners();
            
            // 设置提醒
            setupReminder();
        });
        
        // 渲染日历
        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';
            
            // 获取当前周的起始日期（周一）
            const startOfWeek = getStartOfWeek(currentDate);
            
            // 更新当前周显示
            document.getElementById('currentWeek').textContent = `${formatDate(startOfWeek)} - ${formatDate(addDays(startOfWeek, 6))}`;
            
            // 创建时间轴标题单元格
            const timeHeaderCell = document.createElement('div');
            timeHeaderCell.className = 'calendar-header time-header flex items-center justify-center font-medium bg-gray-50';
            calendar.appendChild(timeHeaderCell);
            
            // 创建日期标题行
            for (let i = 0; i < 7; i++) {
                const date = addDays(startOfWeek, i);
                const dayCell = document.createElement('div');
                dayCell.className = 'calendar-header flex flex-col items-center justify-center font-medium bg-gray-50';
                
                const dayName = document.createElement('div');
                dayName.className = 'text-sm';
                dayName.textContent = getDayName(date);
                
                const dayNumber = document.createElement('div');
                dayNumber.className = 'text-lg';
                dayNumber.textContent = date.getDate();
                
                // 如果是今天，添加高亮
                if (isSameDay(date, new Date())) {
                    dayNumber.className += ' bg-primary text-white rounded-full w-8 h-8 flex items-center justify-center';
                }
                
                dayCell.appendChild(dayName);
                dayCell.appendChild(dayNumber);
                calendar.appendChild(dayCell);
            }
            
            // 创建时间轴和日历单元格
            for (let hour = 0; hour < 24; hour++) {
                // 创建时间标签
                const timeCell = document.createElement('div');
                timeCell.className = 'time-header flex items-center justify-center text-sm text-gray-500 bg-gray-50';
                timeCell.textContent = `${hour.toString().padStart(2, '0')}:00`;
                calendar.appendChild(timeCell);
                
                // 创建每天的单元格
                for (let day = 0; day < 7; day++) {
                    const date = addDays(startOfWeek, day);
                    const cell = document.createElement('div');
                    cell.className = 'calendar-cell';
                    cell.dataset.date = formatDate(date);
                    cell.dataset.hour = hour;
                    
                    calendar.appendChild(cell);
                }
            }
            
            // 渲染活动
            renderActivities();
        }
        
        // 渲染活动
        function renderActivities() {
            // 清除现有活动
            document.querySelectorAll('.activity-block').forEach(block => block.remove());
            
            // 获取当前周的起始和结束日期（字符串格式，更可靠）
            const startOfWeek = getStartOfWeek(currentDate);
            const endOfWeek = addDays(startOfWeek, 6);
            
            const startOfWeekStr = formatDate(startOfWeek);
            const endOfWeekStr = formatDate(endOfWeek);
            const todayStr = formatDate(new Date());
            
            console.log(`📅 本周范围: ${startOfWeekStr} ~ ${endOfWeekStr}`);
            console.log(`📌 今天: ${todayStr}`);
            console.log(`📊 总活动数: ${activities.length}`);
            
            // ⭐ 用字符串比较日期（YYYY-MM-DD 格式，直接比大小很可靠）
            const weeklyActivities = activities.filter(activity => {
                const activityDateStr = activity.date;
                
                // 直接字符串比较："2026-06-15" >= "2026-06-10" 返回 true
                const inWeek = activityDateStr >= startOfWeekStr && activityDateStr <= endOfWeekStr;
                
                // 确保当天的活动（包括普通活动和计划）都被显示
                const isToday = activityDateStr === todayStr;
                
                return inWeek || isToday;
            });
            
            console.log(`✅ 本周显示活动: ${weeklyActivities.length} 条`);
            weeklyActivities.forEach(a => {
                console.log(`   ${a.date} ${a.startTime}-${a.endTime} ${a.title} ${a.isPlan ? '(计划)' : ''}`);
            });
            
            // 渲染每个活动
            weeklyActivities.forEach(activity => {
                const activityElement = createActivityElement(activity);
                const startHour = getHourFromTime(activity.startTime);
                const cell = document.querySelector(`.calendar-cell[data-date="${activity.date}"][data-hour="${startHour}"]`);
                
                if (cell) {
                    cell.appendChild(activityElement);
                }
            });
        }
        
        // 创建活动元素
        function createActivityElement(activity) {
            const element = document.createElement('div');

            // ====== 检查是否为AI计划 ======
            const isPlan = activity.isPlan || false;

            // 根据类型选择颜色

                // ============================================================
        // 拖拽功能：长按活动 → 拖动到空白时间格 → 选择移动/复制
        // ============================================================
        let dragState = {
            isDragging: false,
            draggingActivity: null,
            ghostElement: null,
            startX: 0,
            startY: 0,
            dragStartTime: 0,
            moved: false,
            justDragged: false
        };

        // 长按检测（超过 300ms 才视为拖拽，否则是普通点击）
        const LONG_PRESS_MS = 300;

        // 给每个活动块添加拖拽事件
        function setupDragEvents(element, activity) {
            // 鼠标按下 → 等待 300ms 或检测移动 → 进入拖拽模式
            element.addEventListener('mousedown', function(e) {
                if (e.button !== 0) return;
                if (dragState.isDragging) return;

                dragState.dragStartTime = Date.now();
                dragState.startX = e.clientX;
                dragState.startY = e.clientY;
                dragState.draggingActivity = activity;

                let dragStarted = false;
                let cleanedUp = false;

                const timer = setTimeout(() => {
                    if (cleanedUp) return;
                    dragStarted = true;
                    cleanup();
                    startDrag(element, activity, e.clientX, e.clientY);
                }, LONG_PRESS_MS);

                const onMove = (moveEvent) => {
                    if (dragStarted || cleanedUp) return;
                    const dx = Math.abs(moveEvent.clientX - dragState.startX);
                    const dy = Math.abs(moveEvent.clientY - dragState.startY);
                    if (dx > 8 || dy > 8) {
                        dragStarted = true;
                        cleanup();
                        startDrag(element, activity, moveEvent.clientX, moveEvent.clientY);
                    }
                };

                const onUp = () => {
                    if (!dragStarted && !cleanedUp) {
                        cleanup();
                    }
                };

                const cleanup = () => {
                    if (cleanedUp) return;
                    cleanedUp = true;
                    clearTimeout(timer);
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                };

                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            });

            // 触摸设备
            element.addEventListener('touchstart', function(e) {
                const touch = e.touches[0];
                dragState.dragStartTime = Date.now();
                dragState.startX = touch.clientX;
                dragState.startY = touch.clientY;
                dragState.draggingActivity = activity;

                let dragStarted = false;
                let cleanedUp = false;

                const timer = setTimeout(() => {
                    if (cleanedUp) return;
                    dragStarted = true;
                    cleanup();
                    startDrag(element, activity, touch.clientX, touch.clientY);
                }, LONG_PRESS_MS);

                const onMove = (moveEvent) => {
                    if (dragStarted || cleanedUp) return;
                    const mt = moveEvent.touches[0];
                    const dx = Math.abs(mt.clientX - dragState.startX);
                    const dy = Math.abs(mt.clientY - dragState.startY);
                    if (dx > 10 || dy > 10) {
                        dragStarted = true;
                        cleanup();
                        startDrag(element, activity, mt.clientX, mt.clientY);
                    }
                };

                const onEnd = () => {
                    if (!dragStarted && !cleanedUp) {
                        cleanup();
                    }
                };

                const cleanup = () => {
                    if (cleanedUp) return;
                    cleanedUp = true;
                    clearTimeout(timer);
                    document.removeEventListener('touchmove', onMove);
                    document.removeEventListener('touchend', onEnd);
                };

                document.addEventListener('touchmove', onMove);
                document.addEventListener('touchend', onEnd);
            });
        }

        // 开始拖拽
        function startDrag(element, activity, x, y) {
            dragState.isDragging = true;

            // 原活动变透明，表示正在被拖
            element.classList.add('dragging');

            // 记录原活动的颜色（用于创建虚线框）
            const computedStyle = window.getComputedStyle(element);
            const bgColor = computedStyle.backgroundColor || '#a78bfa';

            // 创建跟随鼠标的虚线框
            const ghost = document.createElement('div');
            ghost.className = 'drag-ghost';
            ghost.style.backgroundColor = bgColor;
            ghost.style.borderColor = bgColor;
            ghost.style.width = element.offsetWidth + 'px';
            ghost.style.height = element.offsetHeight + 'px';
            ghost.style.left = x - element.offsetWidth / 2 + 'px';
            ghost.style.top = y - 20 + 'px';
            ghost.style.position = 'fixed';
            document.body.appendChild(ghost);
            dragState.ghostElement = ghost;

            document.body.classList.add('dragging-mode');

            // 拖拽中的移动处理
            const onMove = (moveEvent) => {
                const clientX = moveEvent.clientX !== undefined ? moveEvent.clientX : moveEvent.touches[0].clientX;
                const clientY = moveEvent.clientY !== undefined ? moveEvent.clientY : moveEvent.touches[0].clientY;

                // 更新跟随鼠标的虚线框位置
                ghost.style.left = clientX - element.offsetWidth / 2 + 'px';
                ghost.style.top = clientY - 20 + 'px';

                // 高亮鼠标下方的目标单元格
                highlightTargetCell(clientX, clientY);
            };

            // 鼠标松开 → 完成拖拽
            const onUp = (upEvent) => {
                const clientX = upEvent.clientX !== undefined ? upEvent.clientX : (upEvent.changedTouches ? upEvent.changedTouches[0].clientX : 0);
                const clientY = upEvent.clientY !== undefined ? upEvent.clientY : (upEvent.changedTouches ? upEvent.changedTouches[0].clientY : 0);

                endDrag(clientX, clientY);

                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend', onUp);
            };

            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
            document.addEventListener('touchmove', onMove);
            document.addEventListener('touchend', onUp);
        }

        // 高亮鼠标下方的目标时间格（预览放置位置）
        let lastHighlightedCell = null;
        function highlightTargetCell(x, y) {
            // 获取鼠标下方的元素
            const elements = document.elementsFromPoint(x, y);
            let targetCell = null;

            for (const el of elements) {
                if (el.classList.contains('calendar-cell')) {
                    targetCell = el;
                    break;
                }
            }

            // 移除上一个高亮
            if (lastHighlightedCell && lastHighlightedCell !== targetCell) {
                lastHighlightedCell.style.outline = '';
                lastHighlightedCell.style.backgroundColor = '';
            }

            // 高亮当前目标
            if (targetCell) {
                targetCell.style.outline = '2px dashed #10b981';
                targetCell.style.outlineOffset = '-3px';
                targetCell.style.backgroundColor = 'rgba(16, 185, 129, 0.12)';
                lastHighlightedCell = targetCell;
            } else {
                lastHighlightedCell = null;
            }
        }

        // 结束拖拽
        function endDrag(x, y) {
            const activity = dragState.draggingActivity;

            // 清理样式
            if (dragState.ghostElement) {
                dragState.ghostElement.remove();
            }
            document.body.classList.remove('dragging-mode');

            // 恢复原活动样式
            const allActivities = document.querySelectorAll('.activity-block');
            allActivities.forEach(el => el.classList.remove('dragging'));

            // 清除高亮
            if (lastHighlightedCell) {
                lastHighlightedCell.style.outline = '';
                lastHighlightedCell.style.backgroundColor = '';
                lastHighlightedCell = null;
            }

            // 找到鼠标松开时所在的时间格
            const elements = document.elementsFromPoint(x, y);
            let targetCell = null;
            for (const el of elements) {
                if (el.classList.contains('calendar-cell')) {
                    targetCell = el;
                    break;
                }
            }

            // 重置状态
            dragState.isDragging = false;
            dragState.ghostElement = null;
            dragState.justDragged = true;   // ⭐ 新增：标记刚完成拖拽
            // 200ms 后清除标记（给 click 事件一点缓冲时间）
            setTimeout(() => { dragState.justDragged = false; }, 200);
            if (!targetCell || !activity) {
                return; // 没有在有效区域松开，忽略
            }

            // 获取目标单元格的日期和时间
            const targetDate = targetCell.dataset.date;
            const targetHour = parseInt(targetCell.dataset.hour);

            // 计算原活动时长
            const duration = calculateDuration(activity.startTime, activity.endTime);

            // 计算新时间（保持相同时长）
            const newStartHour = targetHour;
            const newStartMinute = 0; // 对齐到小时开始
            const newStartTime = `${String(newStartHour).padStart(2, '0')}:${String(newStartMinute).padStart(2, '0')}`;

            // 根据时长计算结束时间
            let totalMinutes = newStartHour * 60 + newStartMinute + duration;
            let endHour = Math.floor(totalMinutes / 60);
            let endMinute = totalMinutes % 60;
            if (endHour >= 24) {
                endHour = 23;
                endMinute = 59;
            }
            const newEndTime = `${String(endHour).padStart(2, '0')}:${String(endMinute).padStart(2, '0')}`;

            // 如果日期或时间都没变，不处理
            if (targetDate === activity.date && newStartTime === activity.startTime) {
                return;
            }

            // 显示确认弹窗：移动 / 复制
            showMoveCopyDialog(activity, targetDate, newStartTime, newEndTime);

        // 初始化周统计图表（甜甜圈饼图）
        function initWeeklyChart() {
            const ctx = document.getElementById('weeklyChart').getContext('2d');

            if (weeklyChart) {
                weeklyChart.destroy();
            }

            const types = ['学习/工作', '休息', '运动/娱乐', '通勤/家务/吃饭'];
            const colors = [
                'rgba(59, 130, 246, 0.85)',
                'rgba(16, 185, 129, 0.85)',
                'rgba(245, 158, 11, 0.85)',
                'rgba(107, 114, 128, 0.85)'
            ];

            // 计算本周各类型总分钟数
            const totals = types.map(type =>
                getDailyDataByType(type).reduce((sum, v) => sum + v, 0)
            );
            const allZero = totals.every(v => v === 0);

            weeklyChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: types,
                    datasets: [{
                        data: allZero ? [1, 1, 1, 1] : totals,
                        backgroundColor: allZero
                            ? ['rgba(200,200,200,0.3)', 'rgba(200,200,200,0.3)', 'rgba(200,200,200,0.3)', 'rgba(200,200,200,0.3)']
                            : colors,
                        borderColor: 'white',
                        borderWidth: 3,
                        hoverOffset: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '60%',
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            enabled: !allZero,
                            callbacks: {
                                label: function(context) {
                                    const value = context.raw || 0;
                                    const h = Math.floor(value / 60);
                                    const m = value % 60;
                                    return ` ${context.label}: ${h}h${m > 0 ? m + 'm' : ''}`;
                                }
                            }
                        }
                    }
                }
            });
        }
        
        // 获取按类型分类的每日数据（只统计当前时间之前的条目）
        function getDailyDataByType(type) {
            const startOfWeek = getStartOfWeek(currentDate);
            const data = [];
            const now = new Date();
            const today = formatDate(now);

            for (let i = 0; i < 7; i++) {
                const date = formatDate(addDays(startOfWeek, i));
                const dailyActivities = activities.filter(a => a.date === date && a.type === type).filter(activity => {
                    // 如果是今天，只统计结束时间在当前时间之前的活动
                    if (activity.date === today) {
                        const endDt = new Date(`${activity.date}T${activity.endTime}`);
                        return endDt <= now;
                    }
                    // 过去的日期全部统计，未来日期不统计
                    const activityDate = new Date(activity.date);
                    return activityDate < new Date(today);
                });

                const totalMinutes = dailyActivities.reduce((sum, activity) => {
                    return sum + calculateDuration(activity.startTime, activity.endTime);
                }, 0);

                data.push(totalMinutes);
            }

            return data;
        }
        
        // 更新统计信息
        function updateStatistics() {
            // 只统计本周中当前时间之前的活动
            const startOfWeek = getStartOfWeek(currentDate);
            const endOfWeek = addDays(startOfWeek, 6);
            const now = new Date();
            const today = formatDate(now);

            // 过滤当前周的活动，并排除发生在现在之后的条目（按结束时间判断）
            const weeklyActivities = activities.filter(activity => {
                const activityDate = new Date(activity.date);
                const inWeek = activityDate >= startOfWeek && activityDate <= endOfWeek;
                if (!inWeek) return false;

                // 如果是今天，只有结束时间在当前时间之前的才统计
                if (activity.date === today) {
                    const endDt = new Date(`${activity.date}T${activity.endTime}`);
                    return endDt <= now;
                }

                // 过去日期全部统计，未来日期不统计
                return activityDate < new Date(today);
            });

            // 按类型计算时间
            const timeByType = {
                '学习/工作': 0,
                '休息': 0,
                '运动/娱乐': 0,
                '通勤/家务/吃饭': 0
            };

            weeklyActivities.forEach(activity => {
                const duration = calculateDuration(activity.startTime, activity.endTime);
                if (!timeByType.hasOwnProperty(activity.type)) return;
                timeByType[activity.type] += duration;
            });

            // 更新统计显示
            const fmt = m => { const h = Math.floor(m/60); const min = m%60; return min > 0 ? `${h}h${min}m` : `${h}h`; };
            document.getElementById('studyWorkTime').textContent = fmt(timeByType['学习/工作']);
            document.getElementById('restTime').textContent = fmt(timeByType['休息']);
            document.getElementById('exerciseTime').textContent = fmt(timeByType['运动/娱乐']);
            document.getElementById('dailyTasksTime').textContent = fmt(timeByType['通勤/家务/吃饭']);

            const totalTime = Object.values(timeByType).reduce((sum, time) => sum + time, 0);
            document.getElementById('totalTime').textContent = fmt(totalTime);

            // 更新图表
            initWeeklyChart();
        }

        // 生成每日总结
        function generateDailySummary(date, activities, timeByType) {
            const totalMinutes = Object.values(timeByType).reduce((sum, time) => sum + time, 0);
            const totalHours = Math.round(totalMinutes / 60);
            
            // 找出时间最长的活动类型
            let maxTimeType = '';
            let maxTime = 0;
            
            for (const [type, time] of Object.entries(timeByType)) {
                if (time > maxTime) {
                    maxTime = time;
                    maxTimeType = type;
                }
            }
            
            // 计算各类活动时间占比
            const studyWorkRatio = Math.round((timeByType['学习/工作'] / totalMinutes) * 100);
            const restRatio = Math.round((timeByType['休息'] / totalMinutes) * 100);
            const exerciseRatio = Math.round((timeByType['运动/娱乐'] / totalMinutes) * 100);
            const dailyTasksRatio = Math.round((timeByType['通勤/家务/吃饭'] / totalMinutes) * 100);
            
            // 找出主要活动
            const mainActivities = activities
                .filter(a => a.type === maxTimeType)
                .sort((a, b) => calculateDuration(b.startTime, b.endTime) - calculateDuration(a.startTime, a.endTime))
                .slice(0, 2);
            
            // 生成总结文本
            let summary = `<p class="mb-2">今天你总共记录了 <strong>${totalHours}小时</strong> 的活动。</p>`;
            
            summary += `<p class="mb-2">你在 <strong>${maxTimeType}</strong> 上花费了最多时间（${Math.round(maxTime / 60)}小时），占全天活动的 <strong>${Math.round((maxTime / totalMinutes) * 100)}%</strong>。</p>`;
            
            if (mainActivities.length > 0) {
                summary += `<p class="mb-2">主要活动包括：</p><ul class="list-disc pl-5 mb-2">`;
                mainActivities.forEach(activity => {
                    const duration = calculateDuration(activity.startTime, activity.endTime);
                    summary += `<li>${activity.title}（${Math.round(duration / 60)}小时${duration % 60 > 0 ? ` ${duration % 60}分钟` : ''}）</li>`;
                });
                summary += `</ul>`;
            }
            
            // 效率分析
            summary += `<p class="mb-2">时间分配分析：</p><ul class="list-disc pl-5 mb-2">`;
            
            if (studyWorkRatio > 50) {
                summary += `<li>学习/工作时间占比较高（${studyWorkRatio}%），保持了良好的专注度。</li>`;
            } else if (studyWorkRatio < 30) {
                summary += `<li>学习/工作时间占比较低（${studyWorkRatio}%），可能需要增加专注时间。</li>`;
            } else {
                summary += `<li>学习/工作时间占比适中（${studyWorkRatio}%）。</li>`;
            }
            
            if (restRatio < 15) {
                summary += `<li>休息时间较少（${restRatio}%），注意劳逸结合。</li>`;
            } else if (restRatio > 30) {
                summary += `<li>休息时间充足（${restRatio}%），有助于恢复精力。</li>`;
            }
            
            if (exerciseRatio < 5) {
                summary += `<li>运动/娱乐时间较少（${exerciseRatio}%），建议增加身体活动。</li>`;
            } else if (exerciseRatio > 15) {
                summary += `<li>运动/娱乐时间充足（${exerciseRatio}%），保持了良好的生活平衡。</li>`;
            }
            
            if (dailyTasksRatio > 25) {
                summary += `<li>通勤/家务/吃饭时间较多（${dailyTasksRatio}%），可能需要优化日常事务。</li>`;
            }
            
            summary += `</ul>`;
            
            // 鼓励性语句
            const encouragements = [
                '继续保持良好的时间管理习惯！',
                '今天的安排很不错，继续加油！',
                '合理的时间分配有助于提高效率。',
                '保持这种平衡的生活方式！',
                '你的时间管理能力正在提升！'
            ];
            
            summary += `<p class="font-medium text-primary">${encouragements[Math.floor(Math.random() * encouragements.length)]}</p>`;
            
            return summary;
        }

            const input = document.getElementById('chatInput');

            if (message) {
                addChatMessage(message, 'user');
                input.value = '';
                
                const chatContainer = document.getElementById('chatContainer');

                    const isAdjustRequest = adjustKeywords.some(keyword => message.includes(keyword));
                    
                    let reply;
                    
                    if (isAdjustRequest) {
                        // 调用调整计划接口
                        const adjustResponse = await fetch('https://schedule-app-production-8f26.up.railway.app/api/ai/adjust-plan', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: message })
                        });
                        
                        const adjustResult = await adjustResponse.json();
                        
                        if (adjustResult.adjusted && adjustResult.activities.length > 0) {
                            const planText = adjustResult.activities.map(a => 
                                `  ${a.start_time}-${a.end_time} ${a.title}`
                            ).join('\n');
                            reply = `${adjustResult.message}\n\n当前计划：\n${planText}`;
                            renderCalendar(); // 刷新日历
                        } else {

                            const todayActivities = activities.filter(a => a.date === today);
                            const context = {
                                activities: todayActivities,
                                settings: userSettings
                            };
                            reply = await window.aiService.generateReply(message, context);
                        }
                    } else {

                        const today = formatDate(new Date());
                        const todayActivities = activities.filter(a => a.date === today);
                        const context = {
                            activities: todayActivities,
                            settings: userSettings
                        };
                        reply = await window.aiService.generateReply(message, context);
                    }

                    addChatMessage('抱歉，处理请求时出现错误：' + error.message, 'ai');

                            throw new Error(error.detail || '生成失败');
                        }

                        const result = await response.json();

                        // 移除思考提示
                        removeThinkingMessage(thinkingId);

                        // 在聊天框显示AI生成结果
                        let reply = `✅ 已根据你的要求生成并保存明天(${result.date})的计划！\n\n`;
                        if (result.activities && result.activities.length > 0) {
                            reply += `共生成 ${result.activities.length} 个活动安排：\n`;
                            result.activities.forEach((act, i) => {
                                reply += `${i + 1}. ${act.startTime}~${act.endTime} 「${act.title}」\n`;
                            });
                        } else if (result.message) {
                            reply += result.message;
                        }
                        reply += '\n\n计划会以淡色虚线框显示在明天的日程表里，点击确认后转为正式活动。';

                        addChatMessage(reply, 'ai');

                        // 重新加载日历，显示新生成的计划
                        await loadActivities();
                        renderCalendar();
                        updateStatistics();

                        // 自动切回聊天模式，方便下次继续对话
                        document.querySelector('input[name="sendMode"][value="chat"]').checked = true;
                    }
                    // ========== 默认：聊天交流 ==========
                    else {
                        // 调用后端的AI聊天接口
                        const response = await fetch(
                            'https://schedule-app-production-8f26.up.railway.app/api/ai/chat?message=' + encodeURIComponent(message),
                            {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' }
                            }
                        );

                        if (!response.ok) {
                            throw new Error('请求失败');
                        }

                        const data = await response.json();

                        // 移除思考提示
                        removeThinkingMessage(thinkingId);

                        // 显示AI回复
                        addChatMessage(data.reply || data.message || data, 'ai');
                    }

                    chatContainer.scrollTop = chatContainer.scrollHeight;

                } catch (error) {
                    console.error('发送失败:', error);
                    removeThinkingMessage(thinkingId);

                    // 根据错误类型给不同提示
                    const hintMsg = sendMode === 'plan'
                        ? '生成明日计划失败，请检查后端服务是否正常运行。\n\n详细信息：' + error.message
                        : '发送失败，正在使用本地规则回复。请稍后重试。\n\n详细信息：' + error.message;

                    addChatMessage(hintMsg, 'ai');
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
            }
        }

        function sendQuickReply(message) {

                    <span class="thinking-dots">

                        <span></span>
                        <span></span>
                    </span>
                </span>

        function removeThinkingMessage(id) {
            const element = document.getElementById(id);
            if (element) {
                element.remove();

        }

        function addChatMessage(message, sender) {

        // 显示活动模态框
        function showActivityModal(activity, date, startTime, endTime) {
            const modal = document.getElementById('activityModal');
            const modalTitle = document.getElementById('modalTitle');
            const deleteButton = document.getElementById('deleteActivity');
            
            // 重置表单
            document.getElementById('activityForm').reset();
            
            if (activity) {
                // 编辑现有活动
                modalTitle.textContent = '编辑活动';
                deleteButton.classList.remove('hidden');
                
                document.getElementById('activityId').value = activity.id;
                document.getElementById('activityTitle').value = activity.title;
                document.getElementById('activityType').value = activity.type;
                document.getElementById('activityDate').value = activity.date;
                document.getElementById('activityStart').value = activity.startTime;
                document.getElementById('activityEnd').value = activity.endTime;
                document.getElementById('activityNotes').value = activity.notes || '';
            } else {
                // 添加新活动
                modalTitle.textContent = '添加活动';
                deleteButton.classList.add('hidden');
                
                document.getElementById('activityId').value = '';
                document.getElementById('activityDate').value = date;
                document.getElementById('activityStart').value = startTime;
                document.getElementById('activityEnd').value = endTime;
            }
            
            modal.classList.remove('hidden');
        }
        
        // 编辑活动
        function editActivity(activity) {
            // 如果是AI计划，点击后转换为正式活动（移除isPlan标记）
            if (activity.isPlan) {
                activity.isPlan = false;
                saveActivities();
                renderCalendar();
            }
            
            showActivityModal(activity, activity.date, activity.startTime, activity.endTime);
        }
        
        // 设置提醒
        function setupReminder() {
            if (!userSettings.enableReminders) {
                return;
            }
            
            // 清除现有定时器
            if (window.reminderTimer) {
                clearTimeout(window.reminderTimer);
            }
            
            // 设置新的定时器
            const checkReminder = () => {
                const now = new Date();
                const reminderTime = userSettings.reminderTime.split(':');
                const reminderHour = parseInt(reminderTime[0]);
                const reminderMinute = parseInt(reminderTime[1]);
                
                // 如果当前时间接近提醒时间（前后1分钟）
                if (now.getHours() === reminderHour && now.getMinutes() >= reminderMinute - 1 && now.getMinutes() <= reminderMinute + 1) {
                    const today = formatDate(now);
                    const todayActivities = activities.filter(a => a.date === today);
                    
                    // 如果今天没有活动记录，显示提醒
                    if (todayActivities.length === 0) {
                        showNotification();
                    }
                }
                
                // 每分钟检查一次
                window.reminderTimer = setTimeout(checkReminder, 60 * 1000);
            };
            
            // 立即开始检查
            checkReminder();
        }
        
        // 显示通知
        function showNotification() {
            const notification = document.getElementById('reminderNotification');
            notification.classList.remove('translate-y-full', 'opacity-0');
        }
        
        // 隐藏通知
        function hideNotification() {
            const notification = document.getElementById('reminderNotification');
            notification.classList.add('translate-y-full', 'opacity-0');
        }
        
        // 修改 saveActivities 函数
        async function saveActivities() {
            try {
                for (const activity of activities) {
                    const activityData = {
                        title: activity.title,
                        type: activity.type,
                        date: activity.date,
                        start_time: activity.startTime,
                        end_time: activity.endTime,
                        notes: activity.notes,
                        is_plan: activity.isPlan || false
                    };
                    
                    if (activity.id) {
                        try {
                            // 先尝试获取活动，确认是否存在
                            await window.activityAPI.getById(activity.id);
                            // 如果存在，更新
                            await window.activityAPI.update(activity.id, activityData);
                        } catch (error) {
                            // 如果获取或更新失败，创建新活动
                            console.warn(`活动不存在，创建新活动: ${activity.id}`);
                            const created = await window.activityAPI.create({ ...activityData, id: activity.id });
                            activity.id = created.id;
                        }
                    } else {
                        // 创建新活动
                        const created = await window.activityAPI.create(activityData);
                        activity.id = created.id;
                    }
                }
            } catch (error) {
                console.error('保存活动失败:', error);
                localStorage.setItem('activities', JSON.stringify(activities));
            }
        }

        async function loadActivities() {
            try {
                const apiActivities = await window.activityAPI.getAll();
                console.log('📊 从后端加载的活动:', apiActivities);
                
                activities = apiActivities.map(a => {
                    // ⭐ 明确读取 is_plan（兼容布尔值和数字 0/1）
                    let isPlan = false;
                    if (a.is_plan === true || a.is_plan === 1 || a.is_plan === '1') {
                        isPlan = true;
                    }
                    
                    return {
                        id: a.id,
                        title: a.title,
                        type: a.type,
                        date: a.date,
                        startTime: a.start_time,
                        endTime: a.end_time,
                        notes: a.notes,
                        isPlan: isPlan  // ✅ 确保读取到 is_plan
                    };
                });
                
                // 打印计划活动以便调试
                const planActivities = activities.filter(a => a.isPlan);
                console.log(`✅ 加载成功 ${activities.length} 条活动，其中计划活动 ${planActivities.length} 条`);
                if (planActivities.length > 0) {
                    console.log('📌 计划活动列表:');
                    planActivities.forEach(a => {
                        console.log(`   ${a.date} ${a.startTime}-${a.endTime} ${a.title}`);
                    });
                }
                
            } catch (error) {
                console.error('❌ 加载失败:', error);
                const savedActivities = localStorage.getItem('activities');
                activities = savedActivities ? JSON.parse(savedActivities) : [];
            }
        }

        // 修改 saveSettings 函数
        async function saveSettings() {
            try {
                // 转换为后端命名格式
                const settingsData = {
                    reminder_time: userSettings.reminderTime,
                    enable_reminders: userSettings.enableReminders,
                    enable_ai: userSettings.enableAI
                };
                await window.settingsAPI.update(settingsData);
            } catch (error) {
                console.error('保存设置失败:', error);
                localStorage.setItem('userSettings', JSON.stringify(userSettings));
            }
        }

        // 修改 loadSettings 函数
        async function loadSettings() {
            try {
                const settings = await window.settingsAPI.get();
                // 转换为前端的驼峰命名
                userSettings = {
                    reminderTime: settings.reminder_time,
                    enableReminders: settings.enable_reminders,
                    enableAI: settings.enable_ai
                };
            } catch (error) {
                console.error('加载设置失败:', error);
                const savedSettings = localStorage.getItem('userSettings');
                if (savedSettings) {
                    userSettings = { ...userSettings, ...JSON.parse(savedSettings) };
                }
            }
        }
        
        // 工具函数
        
        // 生成唯一ID
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }
        
         // 获取一周的起始日期（周一）
        function getStartOfWeek(date) {
            const d = new Date(date);
            d.setHours(0, 0, 0, 0);  // ⭐ 确保时间部分为 00:00:00
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }
        
        // 添加天数
        function addDays(date, days) {
            const result = new Date(date);
            result.setDate(result.getDate() + days);
            return result;
        }
        
        // 格式化日期（YYYY-MM-DD）
        function formatDate(date) {
            let d;
            if (typeof date === 'string') {
                // ⭐ 兼容字符串格式 "2026-06-15"
                d = new Date(date + 'T00:00:00');  // 添加时间，确保按本地时间解析
            } else {
                d = new Date(date);
            }
            const year = d.getFullYear();
            const month = (d.getMonth() + 1).toString().padStart(2, '0');
            const day = d.getDate().toString().padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        // 格式化日期显示（月日）
        function formatDateForDisplay(dateString) {
            const date = new Date(dateString);
            const month = date.getMonth() + 1;
            const day = date.getDate();
            return `${month}月${day}日`;
        }
        
        // 获取星期几名称
        function getDayName(date, short = false) {
            const dayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const shortDayNames = ['日', '一', '二', '三', '四', '五', '六'];
            return short ? shortDayNames[date.getDay()] : dayNames[date.getDay()];
        }
        
        // 判断两个日期是否是同一天
        function isSameDay(date1, date2) {
            return date1.getFullYear() === date2.getFullYear() &&
                   date1.getMonth() === date2.getMonth() &&
                   date1.getDate() === date2.getDate();
        }
        
        // 从时间字符串获取小时
        function getHourFromTime(timeString) {
            return parseInt(timeString.split(':')[0]);
        }
        
        // 从时间字符串获取分钟
        function getMinuteFromTime(timeString) {
            return parseInt(timeString.split(':')[1]);
        }
        
        // 计算两个时间之间的分钟差
        function calculateDuration(startTime, endTime) {
            const startHour = getHourFromTime(startTime);
            const startMinute = getMinuteFromTime(startTime);
            const endHour = getHourFromTime(endTime);
            const endMinute = getMinuteFromTime(endTime);
            
            let duration = (endHour * 60 + endMinute) - (startHour * 60 + startMinute);
            
            // 处理跨天的情况（结束时间早于开始时间）
            if (duration < 0) {
                duration += 24 * 60; // 加上24小时的分钟数
            }
            
            return duration;
        }
        
        // 格式化时间
        function formatTime(date) {
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            return `${hours}:${minutes}`;
        }
        
        // 给时间添加分钟
        function addMinutes(timeString, minutes) {
            const [hours, mins] = timeString.split(':').map(Number);
            const date = new Date();
            date.setHours(hours, mins + minutes, 0, 0);
            return formatTime(date);
        }
        
        // 从时间减去分钟
        function subtractMinutes(timeString, minutes) {
            return addMinutes(timeString, -minutes);
        }
    </script>
